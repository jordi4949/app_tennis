<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar partido</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url('/static/tennis.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .overlay {
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.45);
            padding: 30px 20px;
        }

        .contenedor {
            max-width: 900px;
            margin: 0 auto;
        }

        .tarjeta {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
            padding: 28px;
            margin-bottom: 24px;
        }

        h1 {
            margin-top: 0;
            color: #1f2937;
        }

        .texto-suave {
            color: #4b5563;
            margin-bottom: 18px;
        }

        .grid-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
        }

        .campo label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            color: #374151;
        }

        .campo input,
        .campo select {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 14px;
            background: white;
        }

        .fila-botones {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px 18px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        .btn-secundario {
            background: #6b7280;
        }

        .btn-secundario:hover {
            background: #4b5563;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="contenedor">
            <div class="tarjeta">
                <h1>Editar partido</h1>
                <p class="texto-suave">Modifica los datos del partido</p>

                <form action="/partidos/editar/{{ partido[0] }}" method="post">
                    <div class="grid-form">

                        <div class="campo">
                            <label for="torneo_id">Torneo:</label>
                            <select name="torneo_id" id="torneo_id" required>
                                {% for torneo in torneos %}
                                    <option value="{{ torneo[0] }}" {% if torneo[0] == partido[1] %}selected{% endif %}>
                                        {{ torneo[1] }} - {{ torneo[2] }} - {{ torneo[3] }} - {{ torneo[4] }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="campo">
                            <label for="fecha_partido">Fecha del partido:</label>
                            <input type="date" id="fecha_partido" name="fecha_partido" value="{{ partido[2].strftime('%Y-%m-%d') }}" required>
                        </div>

                        <div class="campo">
                            <label for="jugador1_id">Jugador 1:</label>
                            <select name="jugador1_id" id="jugador1_id" required>
                                {% for jugador in jugadores %}
                                    <option value="{{ jugador[0] }}" {% if jugador[0] == partido[3] %}selected{% endif %}>
                                        {{ jugador[1] }} {{ jugador[2] }} {{ jugador[3] or '' }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="campo">
                            <label for="jugador2_id">Jugador 2:</label>
                            <select name="jugador2_id" id="jugador2_id" required>
                                {% for jugador in jugadores %}
                                    <option value="{{ jugador[0] }}" {% if jugador[0] == partido[4] %}selected{% endif %}>
                                        {{ jugador[1] }} {{ jugador[2] }} {{ jugador[3] or '' }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="campo">
                            <label for="ganador_id">Ganador:</label>
                            <select name="ganador_id" id="ganador_id" required>
                                {% for jugador in jugadores %}
                                    <option value="{{ jugador[0] }}" {% if jugador[0] == partido[5] %}selected{% endif %}>
                                        {{ jugador[1] }} {{ jugador[2] }} {{ jugador[3] or '' }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="campo">
                            <label for="ronda">Ronda:</label>
                            <input type="text" id="ronda" name="ronda" value="{{ partido[6] }}" required>
                        </div>

                        <div class="campo">
                            <label for="resultado">Resultado:</label>
                            <input type="text" id="resultado" name="resultado" value="{{ partido[7] }}" required>
                        </div>

                    </div>

                    <div class="fila-botones">
                        <button type="submit" class="btn">Guardar cambios</button>
                        <a href="/partidos" class="btn btn-secundario">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
