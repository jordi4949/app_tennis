<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar torneo</title>
</head>
<body>
    <h1>Editar torneo</h1>

    <form method="post" action="/torneos/editar/{{ torneo[0] }}">
        <label>Nombre:</label>
        <input type="text" name="nombre" value="{{ torneo[1] }}" required>
        <br><br>

        <label>Fecha inicio:</label>
        <input type="date" name="fecha_inicio" value="{{ torneo[2].strftime('%Y-%m-%d') }}" required>
        <br><br>

        <label>Categoría:</label>
        <input type="text" name="categoria" value="{{ torneo[3] }}" required>
        <br><br>

        <label>Ubicación:</label>
        <input type="text" name="ubicacion" value="{{ torneo[4] }}" required>
        <br><br>

        <button type="submit" onclick="return confirm('¿Guardar cambios del torneo?')">
            Guardar cambios
        </button>

        <a href="/torneos">Cancelar</a>
    </form>
</body>
</html>
