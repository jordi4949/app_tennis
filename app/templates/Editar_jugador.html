<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar jugador</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url('/static/tennis.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .overlay {
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.45);
            padding: 30px 20px;
        }

        .contenedor {
            max-width: 900px;
            margin: 0 auto;
        }

        .tarjeta {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
            padding: 28px;
        }

        h1 {
            margin-top: 0;
            color: #1f2937;
        }

        .grid-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .campo label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            color: #374151;
        }

        .campo input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
        }

        .fila-botones {
            margin-top: 20px;
            display: flex;
            gap: 12px;
        }

        .btn {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px 18px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        .btn-secundario {
            background: #6b7280;
        }

        .btn-secundario:hover {
            background: #4b5563;
        }
    </style>
</head>

<body>
    <div class="overlay">
        <div class="contenedor">

            <div class="tarjeta">
                <h1>Editar jugador</h1>

                <form action="/admin/jugadores/editar/{{ jugador[0] }}" method="post">
                    <div class="grid-form">

                        <div class="campo">
                            <label>Nombre:</label>
                            <input type="text" name="nombre" value="{{ jugador[1] }}" required>
                        </div>

                        <div class="campo">
                            <label>Apellido 1:</label>
                            <input type="text" name="apellido1" value="{{ jugador[2] }}" required>
                        </div>

                        <div class="campo">
                            <label>Apellido 2:</label>
                            <input type="text" name="apellido2" value="{{ jugador[3] or '' }}">
                        </div>

                        <div class="campo">
                            <label>Club:</label>
                            <input type="text" name="club" value="{{ jugador[4] or '' }}">
                        </div>

                        <div class="campo">
                            <label>Año nacimiento:</label>
                            <input type="number" name="ano_nacimiento" value="{{ jugador[5] }}" required>
                        </div>

                        <div class="campo">
                            <label>Número licencia:</label>
                            <input type="text" name="numero_licencia" value="{{ jugador[6] or '' }}">
                        </div>

                    </div>

                    <div class="fila-botones">
                        <button type="submit" class="btn">Guardar cambios</button>
                        <a href="/admin/jugadores" class="btn btn-secundario">Cancelar</a>
                    </div>
                </form>

            </div>

        </div>
    </div>
</body>
</html>
