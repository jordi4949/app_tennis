<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>App Tenis</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url('/static/tennis.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .overlay {
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.45);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tarjeta {
            background: rgba(255, 255, 255, 0.92);
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
            text-align: center;
            width: 420px;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #1f2937;
            font-size: 32px;
        }

        .subtitulo {
            color: #4b5563;
            margin-bottom: 28px;
            font-size: 16px;
        }

        .menu {
            display: grid;
            gap: 14px;
        }

        .menu a {
            display: block;
            text-decoration: none;
            background: #2563eb;
            color: white;
            padding: 14px 18px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            transition: 0.2s;
        }

        .menu a:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="tarjeta">
            <h1>🎾 App Tenis</h1>
            <p class="subtitulo">Panel principal</p>

            <div class="menu">
                <a href="/admin/jugadores">Jugadores</a>
                <a href="/admin/torneos">Torneos</a>
                <a href="/admin/partidos">Partidos</a>
                <a href="/admin/sets">Sets</a>
            </div>
        </div>
    </div>
</body>
</html>
